appId: com.mannydallal.macleaner
productName: Mac Cleaner
copyright: Copyright © 2026 mannydallal

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities
  identity: null

dmg:
  title: Mac Cleaner
  background: build/background.png
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target: AppImage
  category: Utility
