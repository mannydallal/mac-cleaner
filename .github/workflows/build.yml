name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & package for Mac
        run: npm run package:mac

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & package for Windows
        run: npm run package:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          retention-days: 30

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac installer
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./release

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Mac Cleaner v${{ github.run_number }}
          body: |
            ## Download
            - **Mac (Apple Silicon M1/M2/M3)**: Download the `arm64.dmg` file → open it → drag Mac Cleaner to Applications
            - **Mac (Intel)**: Download the `.dmg` file (without arm64) → open it → drag Mac Cleaner to Applications
            - **Windows** (Parallels): Download the `.exe` file → run the installer

            > First time on Mac: right-click the app → Open (bypasses the security warning)
          files: ./release/*
          draft: false
          prerelease: false
